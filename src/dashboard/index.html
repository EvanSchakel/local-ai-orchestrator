<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Local AI Orchestrator — Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d1117; color: #c9d1d9; font-family: 'SF Mono', 'Fira Code', monospace; padding: 24px; }
    h1 { color: #58a6ff; font-size: 1.4rem; margin-bottom: 24px; }
    h2 { color: #8b949e; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 12px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; margin-bottom: 32px; }
    .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 16px; }
    .card .label { font-size: 0.75rem; color: #8b949e; margin-bottom: 4px; }
    .card .value { font-size: 1.6rem; font-weight: bold; color: #58a6ff; }
    table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
    th { text-align: left; padding: 8px 12px; background: #161b22; color: #8b949e; border-bottom: 1px solid #30363d; }
    td { padding: 8px 12px; border-bottom: 1px solid #21262d; }
    tr:hover td { background: #161b22; }
    .tag { display: inline-block; background: #1f6feb33; color: #58a6ff; border-radius: 4px; padding: 1px 6px; font-size: 0.7rem; margin-right: 4px; }
    .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
    .green { background: #3fb950; } .yellow { background: #d29922; } .red { background: #f85149; }
  </style>
</head>
<body>
  <h1>🧠 Local AI Orchestrator</h1>

  <div class="grid">
    <div class="card"><div class="label">Total Requests</div><div class="value" id="total">—</div></div>
    <div class="card"><div class="label">Avg Latency</div><div class="value" id="avgLatency">—</div></div>
    <div class="card"><div class="label">Most Used Model</div><div class="value" style="font-size:1rem" id="topModel">—</div></div>
    <div class="card"><div class="label">Registered Models</div><div class="value" id="modelCount">—</div></div>
  </div>

  <h2>Recent Requests</h2>
  <table>
    <thead>
      <tr><th>Time</th><th>Model</th><th>Task</th><th>Latency</th><th>Tok/s</th></tr>
    </thead>
    <tbody id="recentBody"></tbody>
  </table>

  <script src="dashboard.js"></script>
</body>
</html>
